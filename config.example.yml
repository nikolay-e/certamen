question: |
  What are the three most important principles for designing reliable
  distributed systems? Be concise.

models:
  gpt:
    provider: openai
    model_name: gpt-5.2-pro
    display_name: GPT
    temperature: 0.7
    max_tokens: 4096

  claude:
    provider: anthropic
    model_name: anthropic/claude-opus-4-6
    display_name: Claude
    temperature: 0.7
    max_tokens: 4096

  gemini:
    provider: google
    model_name: gemini/gemini-3.1-pro-preview
    display_name: Gemini
    temperature: 0.7
    max_tokens: 4096

  grok:
    provider: xai
    model_name: xai/grok-4-1-fast-reasoning
    display_name: Grok
    temperature: 0.8
    max_tokens: 4096

workflow: diamond-tournament

overrides:
  gate.max_rounds: 4
  peer_review.criteria: >
    Judge analytical depth, scientific rigor, and reasoning quality.
    Reward novel well-evidenced insights and intellectual independence.
    Penalize speculation and moral hedging.

outputs_dir: "."

logging:
  level: INFO
  file_logging: true
  console_logging: true

secrets:
  providers:
    openai:
      env_var: OPENAI_API_KEY
      op_path: op://Personal/OpenAI/api-key
    anthropic:
      env_var: ANTHROPIC_API_KEY
      op_path: op://Personal/Anthropic/api-key
    google:
      env_var: GOOGLE_API_KEY
      op_path: op://Personal/Google/api-key
    xai:
      env_var: XAI_API_KEY
      op_path: op://Personal/XAI/api-key
    deepseek:
      env_var: DEEPSEEK_API_KEY
      op_path: op://Personal/DeepSeek/api-key
