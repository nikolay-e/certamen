# Certamen Microservices Architecture
# Three-tier architecture for horizontal scalability:
# 1. PostgreSQL - Database (authentication)
# 2. Backend - Python API + WebSocket (business logic)
# 3. Frontend - Nginx + React SPA (static files + reverse proxy)

services:
  # ==========================================
  # Database Layer
  # ==========================================
  postgres:
    image: postgres:17-alpine
    container_name: certamen-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-certamen}
      POSTGRES_USER: ${POSTGRES_USER:-certamen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-certamen}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - certamen-network
    restart: unless-stopped

  # ==========================================
  # Backend Layer (Python API + WebSocket)
  # ==========================================
  # Handles: /api/*, /ws, /auth/*
  # Scalable: can run multiple replicas with load balancer
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: certamen-backend
    expose:
      - 8765
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Environment mode (production/development)
      CERTAMEN_ENV: ${CERTAMEN_ENV:-development}

      # Database configuration (PostgreSQL connection)
      CERTAMEN_DB_HOST: postgres
      CERTAMEN_DB_PORT: 5432
      CERTAMEN_DB_NAME: ${POSTGRES_DB:-certamen}
      CERTAMEN_DB_USER: ${POSTGRES_USER:-certamen}
      CERTAMEN_DB_PASSWORD: ${POSTGRES_PASSWORD:-change_this_password}
      CERTAMEN_DB_POOL_MIN_SIZE: ${CERTAMEN_DB_POOL_MIN_SIZE:-2}
      CERTAMEN_DB_POOL_MAX_SIZE: ${CERTAMEN_DB_POOL_MAX_SIZE:-10}

      # JWT Authentication (min 32 chars, generate with: openssl rand -hex 32)
      CERTAMEN_JWT_SECRET: ${CERTAMEN_JWT_SECRET:-change_this_jwt_secret_to_something_secure}
      CERTAMEN_JWT_ACCESS_TOKEN_EXPIRES_MINUTES: ${CERTAMEN_JWT_ACCESS_TOKEN_EXPIRES_MINUTES:-15}
      CERTAMEN_JWT_REFRESH_TOKEN_EXPIRES_DAYS: ${CERTAMEN_JWT_REFRESH_TOKEN_EXPIRES_DAYS:-30}

      # Skip authentication (ONLY for development, NEVER in production!)
      CERTAMEN_SKIP_AUTH: ${CERTAMEN_SKIP_AUTH:-false}

      # CORS (comma-separated origins, e.g., http://localhost:8765,https://yourdomain.com)
      CERTAMEN_ALLOWED_ORIGINS: ${CERTAMEN_ALLOWED_ORIGINS:-http://localhost:8765,http://127.0.0.1:8765}

      # WebSocket Rate Limiting (DDoS protection)
      CERTAMEN_MAX_WEBSOCKET_CONNECTIONS: ${CERTAMEN_MAX_WEBSOCKET_CONNECTIONS:-1000}
      CERTAMEN_MAX_CONNECTIONS_PER_IP: ${CERTAMEN_MAX_CONNECTIONS_PER_IP:-10}
      CERTAMEN_WEBSOCKET_MESSAGE_RATE_LIMIT_PER_SECOND: ${CERTAMEN_WEBSOCKET_MESSAGE_RATE_LIMIT_PER_SECOND:-10}
      CERTAMEN_WEBSOCKET_MESSAGE_RATE_LIMIT_PER_MINUTE: ${CERTAMEN_WEBSOCKET_MESSAGE_RATE_LIMIT_PER_MINUTE:-100}

      # LLM API Keys
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}

      # LiteLLM configuration
      LITELLM_LOG: ${LITELLM_LOG:-INFO}

      # Application logging level (DEBUG, INFO, WARNING, ERROR)
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}

      # Ollama configuration
      # Default: use host Ollama (already running locally)
      # Override with OLLAMA_BASE_URL=http://ollama:11434 to use Docker Compose Ollama
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}

      # Python configuration
      PYTHONUNBUFFERED: 1
    volumes:
      - ./outputs:/app/outputs
      - ./config.yml:/app/config.yml:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - certamen-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================
  # Frontend Layer (Nginx + React SPA)
  # ==========================================
  # Handles: / (SPA), /assets/* (static files)
  # Proxies: /api/*, /ws, /auth/* → backend:8765
  # Scalable: can run multiple replicas with load balancer
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: certamen-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - certamen-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # ==========================================
  # Ollama LLM Backend (Optional, for local models)
  # ==========================================
  # Local LLM provider for development and testing
  # Provides models: llama2, mistral, codellama, etc.
  # Usage: docker-compose up -d ollama
  # Preload models:
  #   Manual: docker-compose exec ollama ollama pull llama2
  #   Script: docker-compose exec ollama /app/scripts/ollama-preload.sh
  ollama:
    image: ollama/ollama:latest
    container_name: certamen-ollama
    expose:
      - 11434
    environment:
      # Ollama configuration
      OLLAMA_HOST: "0.0.0.0:11434"
      OLLAMA_ORIGINS: "*"  # Allow CORS from any origin (dev only)

      # Optional: Preload models on startup (comma-separated)
      # Uncomment and modify to auto-pull models on first start
      # OLLAMA_MODELS: "llama2,mistral"
    volumes:
      # Persistent storage for models (can be 10-50GB+)
      - ollama_models:/root/.ollama
      # Mount preload script for model management
      - ./scripts:/app/scripts:ro
    networks:
      - certamen-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - ollama
      - all

    # GPU support (uncomment if NVIDIA GPU available)
    # Requires: nvidia-docker runtime installed
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ==========================================
  # CLI Mode (Optional, for batch tournaments)
  # ==========================================
  # Usage: docker-compose --profile cli up cli
  cli:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: certamen-cli
    command: ["certamen", "--config", "/app/config.yml"]
    environment:
      # LLM API Keys
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}

      # LiteLLM configuration
      LITELLM_LOG: ${LITELLM_LOG:-INFO}

      # Application configuration
      PYTHONUNBUFFERED: 1
    volumes:
      - ./outputs:/app/outputs
      - ./config.yml:/app/config.yml:ro
    networks:
      - certamen-network
    profiles:
      - cli
    restart: "no"

volumes:
  postgres_data:
    name: certamen-postgres-data
  ollama_models:
    name: certamen-ollama-models

networks:
  certamen-network:
    name: certamen-network
    driver: bridge
