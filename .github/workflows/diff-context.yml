name: Diff Context
"on": [pull_request]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diff:
    uses: nikolay-e/treemapper-action/.github/workflows/diff-context.yml@b9c88b1ba58a54f13d67c3e7ab56b9eba8355d9e # v1
